
<!DOCTYPE html>
<html>

<body>

<h1>Step 3 - Load cu_series.txt</h1>

<div id="output">
Loading...
</div>


<script>

Promise.all([
    d3.tsv("data/cu_series.txt"),
    d3.tsv("data/cu_Allitems.txt"),
    d3.tsv("data/cu_items.txt")
])
.then(function([seriesData, allItemsData, itemData]) {

    console.log("Series:", seriesData.length);
    console.log("Values:", allItemsData.length);
    console.log("Items:", itemData.length);

    // Create lookup for cu_series
    const seriesLookup = new Map(
        seriesData.map(d => [d.series_id.trim(), d])
    );

const seriesCols = Object.keys(seriesData[0]);

    document.getElementById("output").innerHTML =
    `
    Total Records: ${seriesData.length}<br><br>

    <b>Columns:</b><br>
    ${seriesCols.join("<br>")}
    `;

  const sampleRows = seriesData.slice(0, 5);
   console.log("Sample Rows:");
  console.table(sampleRows);
})

.catch(function(error){

    document.getElementById("output").innerHTML =
    "Error";

});

</script>
