
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>CPI Narrative Visualization</title>

https://d3js.org/d3.v7.min.jsscript>

<style>

body{
    font-family:Arial;
    margin:30px;
}

#chart{
    margin-top:20px;
}

button{
    padding:10px 20px;
    margin:5px;
}

.annotation{
    fill:red;
    font-size:14px;
    font-weight:bold;
}

.tooltip{
    position:absolute;
    background:white;
    border:1px solid black;
    padding:8px;
    visibility:hidden;
    pointer-events:none;
}

</style>
</head>

<body>

<h1>The Story of Inflation in America</h1>

<div id="sceneTitle"></div>
<div id="storyText"></div>

<div id="chart"></div>

<div id="buttons"></div>

<div class="tooltip"></div>

<script>

//////////////////////////////////////////////////////////
// PARAMETERS
//////////////////////////////////////////////////////////

const state = {
    scene: 1
};

let joinedData = [];

//////////////////////////////////////////////////////////
// LOAD DATA
//////////////////////////////////////////////////////////

function cleanRow(d){

    const clean={};

    for(let key in d){

        clean[key.trim()] =
            typeof d[key] === "string"
            ? d[key].trim()
            : d[key];
    }

    return clean;
}

Promise.all([
    d3.tsv("data/cu_series.txt", cleanRow),
    d3.tsv("data/cu_Allitems.txt", cleanRow),
    d3.tsv("data/cu_items.txt", cleanRow)
])

.then(function([seriesData, allItemsData, itemData]){

    const seriesLookup =
        new Map(seriesData.map(d =>
            [d.series_id.trim(), d]
        ));

    const itemLookup =
        new Map(itemData.map(d =>
            [d.item_code.trim(), d]
        ));

    joinedData = allItemsData.map(d => {

        const series =
            seriesLookup.get(d.series_id.trim());

        const item =
            series
            ? itemLookup.get(series.item_code.trim())
            : null;

        return{

            year:+d.year,
            value:+d.value,
            series_id:d.series_id,

            item_name:
                item
                ? item.item_name
                : "Unknown"
        };
    });

    renderScene();
});

//////////////////////////////////////////////////////////
// YEARLY AVERAGE
//////////////////////////////////////////////////////////

function getYearlyData(itemName){

    return d3.rollups(

        joinedData.filter(
            d => d.item_name === itemName
        ),

        v => d3.mean(v,d=>d.value),

        d => d.year

    )

    .map(([year,value]) => ({
        year:+year,
        value:value
    }))

    .sort((a,b)=>a.year-b.year);
}

//////////////////////////////////////////////////////////
// SCENE CONTROLLER
//////////////////////////////////////////////////////////

function renderScene(){

    d3.select("#chart").html("");
    d3.select("#buttons").html("");

    if(state.scene===1){

        drawScene1();

    }else if(state.scene===2){

        drawScene2();

    }else{

        drawScene3();
    }
}

//////////////////////////////////////////////////////////
// SCENE 1
//////////////////////////////////////////////////////////

function drawScene1(){

    d3.select("#sceneTitle")
      .html("<h2>Scene 1: Long-Term Inflation Trend</h2>");

    d3.select("#storyText")
      .html("<p>Consumer prices have increased steadily since 1947.</p>");

    const data =
        getYearlyData("All items");

    drawChart(
        data,
        "All Items CPI",
        "Prices increased steadily since 1947",
        "#1f77b4",
        false
    );

    d3.select("#buttons")
      .html("<button onclick='nextScene()'>Next</button>");
}

//////////////////////////////////////////////////////////
// SCENE 2
//////////////////////////////////////////////////////////

function drawScene2(){

    d3.select("#sceneTitle")
      .html("<h2>Scene 2: Post‑2020 Inflation</h2>");

    d3.select("#storyText")
      .html("<p>Inflation accelerated significantly after 2020.</p>");

    const data =
        getYearlyData("All items")
        .filter(d=>d.year>=2018);

    drawChart(
        data,
        "All Items CPI Since 2018",
        "Inflation accelerated after 2020",
        "red",
        false
    );

    d3.select("#buttons")
      .html(`
        <button onclick="prevScene()">Back</button>
        <button onclick="nextScene()">Next</button>
      `);
}

//////////////////////////////////////////////////////////
// SCENE 3
//////////////////////////////////////////////////////////

function drawScene3(){

    d3.select("#sceneTitle")
      .html("<h2>Scene 3: Energy vs Overall CPI</h2>");

    d3.select("#storyText")
      .html(`
      <p>
      Hover over any point for additional information.
      This is the free-form interaction portion of the narrative.
      </p>
      `);

    drawComparisonChart();

    d3.select("#buttons")
      .html(`
        <button onclick="prevScene()">Back</button>
      `);
}

//////////////////////////////////////////////////////////
// NEXT/BACK TRIGGERS
//////////////////////////////////////////////////////////

function nextScene(){

    state.scene++;
    renderScene();
}

function prevScene(){

    state.scene--;
    renderScene();
}

//////////////////////////////////////////////////////////
// SINGLE LINE CHART
//////////////////////////////////////////////////////////

function drawChart(
    data,
    title,
    annotationText,
    color,
    enableTooltips
){

    const width=900;
    const height=500;
    const margin={top:60,right:40,bottom:60,left:70};

    const svg =
        d3.select("#chart")
        .append("svg")
        .attr("width",width)
        .attr("height",height);

    const x=
        d3.scaleLinear()
        .domain(d3.extent(data,d=>d.year))
        .range([margin.left,width-margin.right]);

    const y=
        d3.scaleLinear()
        .domain([0,d3.max(data,d=>d.value)])
        .nice()
        .range([height-margin.bottom,margin.top]);

    const line=
        d3.line()
        .x(d=>x(d.year))
        .y(d=>y(d.value));

    svg.append("path")
       .datum(data)
       .attr("fill","none")
       .attr("stroke",color)
       .attr("stroke-width",3)
       .attr("d",line);

    svg.append("g")
       .attr("transform",
           `translate(0,${height-margin.bottom})`)
       .call(
           d3.axisBottom(x)
           .tickFormat(d3.format("d"))
       );

    svg.append("g")
       .attr("transform",
            `translate(${margin.left},0)`)
       .call(d3.axisLeft(y));

    svg.append("text")
       .attr("x",250)
       .attr("y",70)
       .attr("class","annotation")
       .text(annotationText);
}

//////////////////////////////////////////////////////////
// SCENE 3 CHART WITH TOOLTIPS
//////////////////////////////////////////////////////////

function drawComparisonChart(){

    const allItems =
        getYearlyData("All items");

    const energy =
        getYearlyData("Energy");

    const width=900;
    const height=500;
    const margin={top:60,right:60,bottom:60,left:70};

    const svg=
        d3.select("#chart")
        .append("svg")
        .attr("width",width)
        .attr("height",height);

    const combined =
        [...allItems,...energy];

    const x=
        d3.scaleLinear()
        .domain(d3.extent(combined,d=>d.year))
        .range([margin.left,width-margin.right]);

    const y=
        d3.scaleLinear()
        .domain([0,d3.max(combined,d=>d.value)])
        .nice()
        .range([height-margin.bottom,margin.top]);

    const line=
        d3.line()
        .x(d=>x(d.year))
        .y(d=>y(d.value));

    svg.append("path")
       .datum(allItems)
       .attr("fill","none")
       .attr("stroke","blue")
       .attr("stroke-width",3)
       .attr("d",line);

    svg.append("path")
       .datum(energy)
       .attr("fill","none")
       .attr("stroke","orange")
       .attr("stroke-width",3)
       .attr("d",line);

    svg.append("g")
       .attr("transform",
          `translate(0,${height-margin.bottom})`)
       .call(
          d3.axisBottom(x)
          .tickFormat(d3.format("d"))
       );

    svg.append("g")
       .attr("transform",
          `translate(${margin.left},0)`)
       .call(d3.axisLeft(y));

    svg.append("text")
       .attr("x",250)
       .attr("y",70)
       .attr("class","annotation")
       .text("Energy is significantly more volatile");

    const tooltip =
        d3.select(".tooltip");

    svg.selectAll(".energyDot")
       .data(energy)
       .enter()
       .append("circle")
       .attr("cx",d=>x(d.year))
       .attr("cy",d=>y(d.value))
       .attr("r",4)
       .attr("fill","orange")

       .on("mouseover",function(event,d){

            tooltip
                .style("visibility","visible")
                .html(
                    "<b>Energy</b><br>" +
                    "Year: " + d.year +
                    "<br>CPI: " +
                    d.value.toFixed(2)
                );
       })

       .on("mousemove",function(event){

            tooltip
                .style("left",
                    (event.pageX+10)+"px")
                .style("top",
                    (event.pageY-20)+"px");
       })

       .on("mouseout",function(){

            tooltip
                .style("visibility","hidden");
       });
}

</script>

</body>
</html>
