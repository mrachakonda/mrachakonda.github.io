
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Amazon Narrative Visualization</title>

    <!-- D3 Library -->
    <script src="https://d3js.org/d3.v7.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }

        h1 {
            margin-bottom: 5px;
        }

        h2 {
            margin-top: 10px;
            color: #333;
        }

        #status {
            margin-bottom: 15px;
            color: green;
            font-weight: bold;
        }

        svg {
            border: 1px solid #ddd;
            background-color: white;
        }

        .axis-label {
            font-size: 14px;
            font-weight: bold;
        }

        .annotation {
            fill: red;
            font-size: 16px;
            font-weight: bold;
        }

        .point {
            fill: steelblue;
            opacity: 0.7;
        }
    </style>
</head>

<body>

    <h1>What Makes an Amazon Product Successful?</h1>

    <h2>Scene 1: Price vs Product Popularity</h2>

    <div id="status">Loading data...</div>

    <svg id="chart" width="900" height="500"></svg>

    <script>

        Promise.all([
            d3.csv("data/products.csv"),
            d3.csv("data/categories.csv")
        ])
            .then(([products, categories]) => {

                // Build category lookup using categories.id
                const categoryMap = {};

                categories.forEach(category => {
                    categoryMap[category.id] = category;
                });

                // Join products.category_id with categories.id
                const joinedData = products.map(product => ({

                    ...product,

                    price: +product.price,
                    stars: +product.stars,
                    reviews: +product.reviews,
                    boughtInLastMonth: +product.boughtInLastMonth,

                    category_name:
                        categoryMap[product.category_id]?.category_name || "Unknown"

                }));

                // Remove records where price or boughtInLastMonth is missing or invalid
                const cleanData = joinedData.filter(d =>
                    !isNaN(d.price) &&
                    !isNaN(d.boughtInLastMonth) &&
                    d.price >= 0 &&
                    d.boughtInLastMonth >= 0
                );

                document.getElementById("status").innerHTML =
                    `Loaded ${cleanData.length} products`;

                drawScene1(cleanData);

            })
            .catch(error => {

                console.error(error);

                document.getElementById("status").innerHTML =
                    "Error loading CSV files. Please check file names and data folder.";

            });



        function drawScene1(data) {

            const svg = d3.select("#chart");

            // Clear SVG before drawing
            svg.selectAll("*").remove();

            const width = 900;
            const height = 500;

            const margin = {
                top: 70,
                right: 40,
                bottom: 70,
                left: 90
            };

            // X scale: Product price
            const x = d3.scaleLinear()
                .domain([
                    0,
                    d3.max(data, d => d.price)
                ])
                .nice()
                .range([margin.left, width - margin.right]);

            // Y scale: Bought in last month
            const y = d3.scaleLinear()
                .domain([
                    0,
                    d3.max(data, d => d.boughtInLastMonth)
                ])
                .nice()
                .range([height - margin.bottom, margin.top]);

            // X axis
            svg.append("g")
                .attr("transform", `translate(0, ${height - margin.bottom})`)
                .call(d3.axisBottom(x));

            // Y axis
            svg.append("g")
                .attr("transform", `translate(${margin.left}, 0)`)
                .call(d3.axisLeft(y));

            // X axis label
            svg.append("text")
                .attr("class", "axis-label")
                .attr("x", width / 2)
                .attr("y", height - 25)
                .attr("text-anchor", "middle")
                .text("Product Price ($)");

            // Y axis label
            svg.append("text")
                .attr("class", "axis-label")
                .attr("transform", "rotate(-90)")
                .attr("x", -height / 2)
                .attr("y", 30)
                .attr("text-anchor", "middle")
                .text("Bought In Last Month");

            // Scatter plot circles
            svg.selectAll("circle")
                .data(data)
                .enter()
                .append("circle")
                .attr("class", "point")
                .attr("cx", d => x(d.price))
                .attr("cy", d => y(d.boughtInLastMonth))
                .attr("r", 6);

            // Scene annotation
            svg.append("text")
                .attr("class", "annotation")
                .attr("x", width / 2)
                .attr("y", 35)
                .attr("text-anchor", "middle")
                .text("Scene 1: Investigating whether lower-priced products attract more purchases");

        }

    </script>

</body>

</html>
