<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Inflation Narrative Dashboard</title>
    <!-- Include the D3 library -->
    <script src="https://d3js.org"></script>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            display: flex; 
            margin: 0; 
            background-color: #fafafa;
            color: #333; 
        }
        #sidebar { 
            width: 30%; 
            height: 100vh; 
            padding: 40px; 
            box-sizing: border-box; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            background: white; 
            border-right: 1px solid #ddd;
        }
        #chart-container { 
            width: 70%; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: relative;
        }
        svg {
            background: #ffffff;
            border: 1px solid #eee;
            border-radius: 8px;
        }
        h1 { font-size: 24px; margin-bottom: 10px; color: #111; }
        p { font-size: 16px; line-height: 1.6; color: #666; min-height: 120px; }
        .controls { display: flex; gap: 10px; margin-top: 20px; }
        button { 
            padding: 10px 20px; 
            font-size: 14px; 
            border: none; 
            background: #e0e0e0; 
            color: #333; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold;
        }
        button#next-btn { background: #ff4757; color: white; }
        button:disabled { background: #f0f0f0; color: #ccc; cursor: not-allowed; }
        
        /* Tooltip Style */
        .chart-tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 8px 12px;
            font-size: 13px;
            border-radius: 4px;
            pointer-events: none;
            opacity: 0;
        }
    </style>
</head>
<body>

    <!-- LEFT SIDEBAR FOR TEXT AND BUTTONS -->
    <div id="sidebar">
        <h1 id="story-title">The Big Picture</h1>
        <p id="story-body">Loading our inflation timeline data...</p>
        <div class="controls">
            <button id="back-btn" disabled>Back</button>
            <button id="next-btn">Next</button>
        </div>
    </div>

    <!-- RIGHT SIDE FOR THE GRAPH -->
    <div id="chart-container">
        <div id="tooltip" class="chart-tooltip"></div>
        <svg id="canvas"></svg>
    </div>

    <script>
        // --- STEP 1: SETTING UP THE DIMENSIONS ---
        var margin = {top: 50, right: 150, bottom: 50, left: 60};
        var width = (window.innerWidth * 0.7) - margin.left - margin.right;
        var height = window.innerHeight - margin.top - margin.bottom;

        // Create the SVG container canvas
        var svg = d3.select("#canvas")
            .attr("width", width + margin.left + margin.right)
            .attr("height", height + margin.top + margin.bottom)
          .append("g")
            .attr("transform", "translate(" + margin.left + "," + margin.top + ")");

        var tooltip = d3.select("#tooltip");

        // Keep track of which slide the user is on (0, 1, or 2)
        var currentSlide = 0;

        // --- STEP 2: CREATING PLAIN DATA ---
        // Generates simple, clean timeline data for testing immediately
        var sampleData = [];
        var startHeadline = 2.0;
        var startCore = 1.8;
        for (var i = 0; i < 30; i++) {
            var simulatedDate = new Date(2023, i, 1);
            // Simulate an inflation spike halfway through the timeline
            if (i > 10 && i < 22) {
                startHeadline += 0.4;
                startCore += 0.1;
            } else {
                startHeadline += 0.05;
                startCore += 0.05;
            }
            sampleData.push({
                date: simulatedDate,
                headline: parseFloat(startHeadline.toFixed(1)),
                core: parseFloat(startCore.toFixed(1))
            });
        }

        // Sector breakdown data for the final slide
        var barData = [
            { name: "Transportation & Airfares", percentage: 26.7, color: "#ffa502" },
            { name: "Energy & Gas Costs", percentage: 23.5, color: "#ff4757" },
            { name: "General Household Goods", percentage: 2.9, color: "#747d8c" },
            { name: "Grocery & Food Items", percentage: -1.0, color: "#2ed573" }
        ];

        // --- STEP 3: PRE-BUILDING EMPTY GRAPH ELEMENTS ---
        // We create these once up front so we can easily animate them later
        var xAxisGroup = svg.append("g").attr("transform", "translate(0," + height + ")");
        var yAxisGroup = svg.append("g");
        
        var gapArea = svg.append("path").attr("opacity", 0);
        var headlinePath = svg.append("path").attr("fill", "none").attr("stroke-width", 3);
        var corePath = svg.append("path").attr("fill", "none").attr("stroke-width", 3);
        
        var interactionGroup = svg.append("g");
        var legendGroup = svg.append("g").attr("transform", "translate(" + (width + 20) + ", 20)");

        // --- STEP 4: DEFINING SLIDE VISUALS ---

        // SLIDE 1: Draw two simple lines
        function showSlide1() {
            // 1. Update text and button states manually
            d3.select("#story-title").text("The Big Picture");
            d3.select("#story-body").text("Between 2023 and 2026, a massive structural gap emerged in the U.S. economy. While underlying Core Inflation remained relatively steady, overall Headline inflation accelerated aggressively.");
            d3.select("#back-btn").property("disabled", true);
            d3.select("#next-btn").property("disabled", false);

            // Remove any leftover bars from Slide 3 if moving backwards
            svg.selectAll(".bar-rect").remove();

            // 2. Setup standard line chart axes
            var xScale = d3.scaleTime().domain(d3.extent(sampleData, d => d.date)).range([0, width]);
            var yScale = d3.scaleLinear().domain([0, 12]).range([height, 0]);

            xAxisGroup.transition().duration(500).call(d3.axisBottom(xScale));
            yAxisGroup.transition().duration(500).call(d3.axisLeft(yScale).tickFormat(d => d + "%"));

            // 3. Define the line formulas
            var makeHeadlineLine = d3.line().x(d => xScale(d.date)).y(d => yScale(d.headline));
            var makeCoreLine = d3.line().x(d => xScale(d.date)).y(d => yScale(d.core));

            // 4. Draw the lines with a smooth fade-in duration
            gapArea.transition().duration(300).attr("opacity", 0);

            headlinePath.transition().duration(500)
                .attr("opacity", 1).attr("stroke", "#ff4757").attr("d", makeHeadlineLine(sampleData));

            corePath.transition().duration(500)
                .attr("opacity", 1).attr("stroke", "#747d8c").attr("d", makeCoreLine(sampleData));

            // 5. Add simple text legend labels on the right
            legendGroup.selectAll("*").remove();
            
            var leg1 = legendGroup.append("g");
            leg1.append("rect").attr("width", 12).attr("height", 12).attr("fill", "#ff4757");
            leg1.append("text").attr("x", 20).attr("y", 10).style("font-size", "12px").text("Headline Inflation");

            var leg2 = legendGroup.append("g").attr("transform", "translate(0, 25)");
            leg2.append("rect").attr("width", 12).attr("height", 12).attr("fill", "#747d8c");
            leg2.append("text").attr("x", 20).attr("y", 10).style("font-size", "12px").text("Core Inflation");

            // 6. Create invisible vertical hover zones for tooltips
            addHoverTooltips(xScale, yScale);
        }

        // SLIDE 2: Highlight the space between the lines
        function showSlide2() {
            // 1. Update text content
            d3.select("#story-title").text("The Growing Wedge");
            d3.select("#story-body").text("Look closely at the highlighted region. This dramatic separation tells us that the inflation crisis wasn't driven by general consumer demand, but rather by sudden exterior shocks.");
            d3.select("#back-btn").property("disabled", false);
            d3.select("#next-btn").property("disabled", false);

            svg.selectAll(".bar-rect").remove();

            var xScale = d3.scaleTime().domain(d3.extent(sampleData, d => d.date)).range([0, width]);
            var yScale = d3.scaleLinear().domain([0, 12]).range([height, 0]);

            // Define the shaded area block
            var makeArea = d3.area()
                .x(d => xScale(d.date))
                .y0(d => yScale(d.core))
                .y1(d => yScale(d.headline));

            // Fill the space with color smoothly
            gapArea.attr("d", makeArea(sampleData))
                .transition().duration(500)
                .attr("fill", "#ff4757")
                .attr("opacity", 0.15);

            // Change Core line color to light grey to create focus contrast
            corePath.transition().duration(500).attr("stroke", "#ccc").attr("opacity", 1);
            headlinePath.transition().duration(500).attr("stroke", "#ff4757").attr("opacity", 1);

            legendGroup.selectAll("*").remove();
            var leg = legendGroup.append("g");
            leg.append("rect").attr("width", 12).attr("height", 12).attr("fill", "rgba(255, 71, 87, 0.2)");
            leg.append("text").attr("x", 20).attr("y", 10).style("font-size", "12px").text("Market Strain Gap");

            addHoverTooltips(xScale, yScale);
        }

        // SLIDE 3: Hide lines and morph into a horizontal bar chart
        function showSlide3() {
            // 1. Update descriptive texts
            d3.select("#story-title").text("The Culprits Unmasked");
