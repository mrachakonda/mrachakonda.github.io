
<!DOCTYPE html>
<html>

<head>
  <title>Step 3 - Load Data</title>

  <script src="https://d3js.org/d3.v7.min.js"></script>
</head>

<body>

<h1>Step 3 - Load cu_series.txt</h1>

<div id="output">
Loading...
</div>


<script>

d3.tsv("data/cu_series.txt")
.then(function(data){

    const columns = Object.keys(data[0]);

    document.getElementById("output").innerHTML =
    `
    Total Records: ${data.length}<br><br>

    <b>Columns:</b><br>
    ${columns.join("<br>")}
    `;


 <b>Sample 5 Rows</b>
        <table>
            <thead>
                <tr>
    `;

    // Header row
    columns.forEach(col => {
        html += `<th>${col}</th>`;
    });

    html += `
                </tr>
            </thead>
            <tbody>
    `;

    // First 5 records
    data.slice(0, 5).forEach(row => {

        html += "<tr>";

        columns.forEach(col => {
            html += `<td>${row[col]}</td>`;
        });

        html += "</tr>";
    });

    html += `
            </tbody>
        </table>
    `;

    document.getElementById("output").innerHTML = html;

})

.catch(function(error){

    document.getElementById("output").innerHTML =
    "Error";

});

</script>

</body>

</html>
