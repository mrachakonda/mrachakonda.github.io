
<!DOCTYPE html>
<html>

<head>
  <title>Step 3 - Load Data</title>

  <script src="https://d3js.org/d3.v7.min.js"></script>
</head>

<body>

<h1>Step 3 - Load cu_series.txt</h1>

<div id="output">
Loading...
</div>

<script>


d3.tsv("data/cu_series.txt")

.then(function(data){

    document.getElementById("output").innerHTML =
    `
    ✅ File Parsed Successfully<br><br>

    Total Records: ${data.length}<br><br>

    First Series ID:
    ${data[0].series_id}<br><br>

    First Item Code:
    ${data[0].item_code}<br><br>

    First Series Title:
    ${data[0].series_title}
    `;

    console.log(data);

})
  .catch(function(error) {

      document.getElementById("output").innerHTML =
        "❌ Cannot find cu_series.txt";

  });

</script>

</body>

</html>
