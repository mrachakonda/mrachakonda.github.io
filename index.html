    <h2 id="sceneTitle">Loading...</h2>

    <script>

        // -------------------------------
        // Parameters / State Variables
        // -------------------------------

        let currentScene = 0;
        let globalData = [];



        // -------------------------------
        // Load and Join Data
        // -------------------------------

        Promise.all([
            d3.csv("data/products.csv"),
            d3.csv("data/categories.csv")
        ])
            .then(([products, categories]) => {

                const categoryMap = {};

                categories.forEach(category => {
                    categoryMap[category.id] = category;
                });

                const joinedData = products.map(product => ({

                    ...product,

                    price: +product.price,
                    stars: +product.stars,
                    reviews: +product.reviews,
                    boughtInLastMonth: +product.boughtInLastMonth,

                    category_name:
                        categoryMap[product.category_id]?.category_name || "Unknown"

                }));

                const cleanData = joinedData.filter(d =>
                    !isNaN(d.price) &&
                    !isNaN(d.boughtInLastMonth) &&
                    d.price >= 0 &&
                    d.boughtInLastMonth >= 0
                );

                globalData = cleanData;

                document.getElementById("status").innerHTML =
                    `Loaded ${globalData.length} products`;

                renderScene();

            })
            .catch(error => {

                console.error(error);

                document.getElementById("status").innerHTML =
                    "Error loading CSV files. Please check file names and data folder.";

            });



        // -------------------------------
        // Render Scene Based on Parameter
        // -------------------------------

            if (currentScene === 0) {
                drawScene1(globalData);
            }

            if (currentScene === 1) {
                drawScene2(globalData);
            }

            updateButtons();
        }
