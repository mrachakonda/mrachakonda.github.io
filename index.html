
<!DOCTYPE html>
<html>

<head>
  <title>Step 1 - Load Data</title>

  <script src="https://d3js.org/d3.v7.min.js"></script>
</head>

<body>

<h1>Step 1 - Load cu_series.txt</h1>

<div id="output">
Loading...
</div>

<script>

Promise.all([
  d3.tsv("data/cu_series.txt"),
  d3.tsv("data/cu_items.txt") 
])
.then(function([data, data2]) {

    let html = "";

    html += "<h2>File Loaded Successfully</h2>";

    html += "Total Rows: " + data.length + "<br><br>";

    html += "<h3>Column Names</h3>";

    Object.keys(data[0]).forEach(col => {
        html += "[" + col + "]<br>";
    });

    html += "<br><h3>First 5 Rows</h3>";

    html += "<pre>";
    html += JSON.stringify(data.slice(0,5), null, 2);
    html += "</pre>";

    html += "Total Rows: " + data2.length + "<br><br>";

    html += "<h3>Column Names</h3>";

    Object.keys(data2[0]).forEach(col => {
        html += "[" + col + "]<br>";
    });

    html += "<br><h3>First 5 Rows</h3>";

    html += "<pre>";
    html += JSON.stringify(data2.slice(0,5), null, 2);
    html += "</pre>";

    document.getElementById("output").innerHTML = html;
})

.catch(function(error){

    document.getElementById("output").innerHTML =
    "Error";

});

</script>

</body>

</html>
