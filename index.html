
<!DOCTYPE html>
<html>

<head>
  <title>Step 3 - Load Data</title>

  <script src="https://d3js.org/d3.v7.min.js"></script>
</head>

<body>

<h1>Step 3 - Load cu_series.txt</h1>

<div id="output">
Loading...
</div>


<script>

d3.tsv("data/cu_Allitems.txt")
.then(function(data){

    const columns = Object.keys(data[0]);

    document.getElementById("output").innerHTML =
    `
    Total Records: ${data.length}<br><br>

    <b>Columns:</b><br>
    ${columns.join("<br>")}
    `;

  const sampleRows = data.slice(0, 5);
   console.log("Sample Rows:");
  console.table(sampleRows);
})

.catch(function(error){

    document.getElementById("output").innerHTML =
    "Error";

});

</script>

</body>

</html>
