
<!DOCTYPE html>
<html>

<head>
  <title>Step 3 - Load Data</title>

  <script src="https://d3js.org/d3.v7.min.js"></script>
</head>

<body>

<h1>Step 3 - Load cu_series.txt</h1>

<div id="output">
Loading...
</div>

<script>

d3.text("data/cu_series.txt")
  .then(function(text) {

      const lines = text.split("\n");

      document.getElementById("output").innerHTML =
        `
        ✅ File Loaded Successfully<br><br>

        Total Lines: ${lines.length}<br><br>

        First Line:<br>
        ${lines[0]}
        `;

  })
  .catch(function(error) {

      document.getElementById("output").innerHTML =
        "❌ Cannot find cu_series.txt";

  });

</script>

</body>

</html>
