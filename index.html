
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>CPI Narrative Visualization</title>

<script src="https://d3js.org/d3.v7.min.js"></script>

<style>
body{
    font-family: Arial;
    margin: 30px;
}

#chart{
    margin-top: 20px;
}

button{
    padding: 10px 20px;
    margin: 5px;
    cursor: pointer;
}

.annotation{
    fill: red;
    font-size: 14px;
    font-weight: bold;
}

.tooltip{
    position: absolute;
    background: white;
    border: 1px solid black;
    padding: 8px;
    visibility: hidden;
    pointer-events: none;
    font-size: 13px;
}
</style>
</head>

<body>

<h1>The Story of Inflation in America</h1>

<div id="sceneTitle"></div>
<div id="storyText"></div>
<div id="chart"></div>
<div id="buttons"></div>

<div class="tooltip"></div>

<script>

//////////////////////////////////////////////////////////
// PARAMETERS
//////////////////////////////////////////////////////////

const state = {
    scene: 1
};

let joinedData = [];
let medicalData = [];
let housingData = [];


//////////////////////////////////////////////////////////
// CLEAN ROW FUNCTION
//////////////////////////////////////////////////////////

function cleanRow(d){

    const clean = {};

    for(let key in d){

        const cleanKey = key.trim();

        clean[cleanKey] =
            typeof d[key] === "string"
            ? d[key].trim()
            : d[key];
    }

    return clean;
}


//////////////////////////////////////////////////////////
// LOAD ALL 4 FILES
//////////////////////////////////////////////////////////

Promise.all([
    d3.tsv("data/cu_series.txt", cleanRow),
    d3.tsv("data/cu_Allitems.txt", cleanRow),
    d3.tsv("data/cu_Medical.txt", cleanRow),
    d3.tsv("data/cu_items.txt", cleanRow),
    d3.tsv("data/cu_USHousing.txt", cleanRow)
])
.then(function([
    seriesData,
    allItemsData,
    medicalFileData,
    itemData,
    housingFileData
]){

    console.log("cu_series rows:", seriesData.length);
    console.log("cu_Allitems rows:", allItemsData.length);
    console.log("cu_Medical rows:", medicalFileData.length);
    console.log("cu_items rows:", itemData.length);
    console.log("housing rows:", housingFileData.length);

    medicalData = medicalFileData;
	housingData = housingFileData;

    const seriesLookup =
        new Map(
            seriesData.map(d => [
                d.series_id.trim(),
                d
            ])
        );

    const itemLookup =
        new Map(
            itemData.map(d => [
                d.item_code.trim(),
                d
            ])
        );

    joinedData = allItemsData.map(d => {

        const series =
            seriesLookup.get(d.series_id.trim());

        const item =
            series
            ? itemLookup.get(series.item_code.trim())
            : null;

        return {
            year: +d.year,
            value: +d.value,
            series_id: d.series_id ? d.series_id.trim() : "",
            item_name:
                item
                ? item.item_name.trim()
                : "Unknown"
        };
    })
    .filter(d =>
        !isNaN(d.year) &&
        !isNaN(d.value) &&
        d.item_name !== "Unknown"
    );

    console.log("Joined records:", joinedData.length);

    console.log(
        "All Items yearly records:",
        getYearlyData("All items").length
    );

    console.log(
        "Medical yearly records:",
        getMedicalYearlyData().length
    );

     console.log(
        "Housing yearly records:",
        getHousingYearlyData().length
    );

    renderScene();

})
.catch(function(error){

    console.error("Error loading data files:", error);

    d3.select("#sceneTitle")
      .html("<h2>Error Loading Files</h2>");

    d3.select("#storyText")
      .html(`
        <p>Please confirm these files exist inside the <b>data</b> folder:</p>

        <ul>
            <li>data/cu_series.txt</li>
            <li>data/cu_Allitems.txt</li>
            <li>data/cu_Medical.txt</li>
            <li>data/cu_items.txt</li>
        </ul>

        <p><b>Error:</b> ${error}</p>
      `);
});


//////////////////////////////////////////////////////////
// YEARLY AVERAGE FOR JOINED CPI DATA
//////////////////////////////////////////////////////////

function getYearlyData(itemName){

    return d3.rollups(

        joinedData.filter(
            d => d.item_name === itemName
        ),

        v => d3.mean(v, d => d.value),

        d => d.year

    )
    .map(([year, value]) => ({
        year: +year,
        value: value
    }))
    .sort((a,b) => a.year - b.year);
}


//////////////////////////////////////////////////////////
// YEARLY AVERAGE FOR MEDICAL FILE
//////////////////////////////////////////////////////////

function getMedicalYearlyData(){

    return d3.rollups(

        medicalData.filter(d =>
            !isNaN(+d.year) &&
            !isNaN(+d.value)
        ),

        v => d3.mean(v, d => +d.value),

        d => +d.year

    )
    .map(([year, value]) => ({
        year: +year,
        value: value
    }))
    .sort((a,b) => a.year - b.year);
}

//////////////////////////////////////////////////////////
// YEARLY AVERAGE FOR Housing FILE
//////////////////////////////////////////////////////////

function getHousingYearlyData(){

    return d3.rollups(

        housingData.filter(d =>
            !isNaN(+d.year) &&
            !isNaN(+d.value)
        ),

        v => d3.mean(v, d => +d.value),

        d => +d.year

    )
    .map(([year, value]) => ({
        year: +year,
        value: value
    }))
    .sort((a,b) => a.year - b.year);
}
    

//////////////////////////////////////////////////////////
// SCENE CONTROLLER
//////////////////////////////////////////////////////////

function renderScene(){

    d3.select("#chart").html("");
    d3.select("#buttons").html("");

    if(state.scene === 1){
        drawScene1();
    }
    else if(state.scene === 2){
        drawScene2();
    }
    else if(state.scene === 3){
        drawScene3();
    }
}


//////////////////////////////////////////////////////////
// SCENE 1
//////////////////////////////////////////////////////////

function drawScene1(){

    d3.select("#sceneTitle")
      .html("<h2>Long-Term Inflation Trend</h2>");

    d3.select("#storyText")
      .html(`
        <p>
        This scene introduces the overall Consumer Price Index using
        the <b>All Items CPI</b> category.
        </p>

        <p>
        The main message is that consumer prices have increased steadily
        over time.
        </p>
      `);

    const data =
        getYearlyData("All items");

    drawChart(
        data,
        "All Items CPI",
        "Prices increased steadily over time",
        "#1f77b4"
    );

    d3.select("#buttons")
      .html(`<button onclick="nextScene()">Next</button>`);
}


//////////////////////////////////////////////////////////
// SCENE 2
//////////////////////////////////////////////////////////

function drawScene2(){

    d3.select("#sceneTitle")
      .html("<h2>Post-2020 Inflation Increase</h2>");

    d3.select("#storyText")
      .html(`
        <p>
        This scene zooms into the recent period beginning in 2018.
        It highlights the faster increase in inflation after 2020.
        </p>
      `);

    const data =
        getYearlyData("All items")
        .filter(d => d.year >= 2018);

    drawChart(
        data,
        "All Items CPI Since 2018",
        "Inflation accelerated after 2020",
        "red"
    );

    d3.select("#buttons")
      .html(`
        <button onclick="prevScene()">Back</button>
        <button onclick="nextScene()">Next</button>
      `);
}


//////////////////////////////////////////////////////////
// SCENE 3
//////////////////////////////////////////////////////////

function drawScene3(){

    d3.select("#sceneTitle")
      .html("<h2>Category Comparison vs Overall CPI</h2>");

  
d3.select("#storyText")
  .html(`
    <ul>
      <li>Compare Overall CPI with Medical Care or Housing CPI.</li>
      <li>Medical Care inflation has generally increased faster than Overall CPI.</li>
      <li>Housing inflation follows a different long-term pattern.</li>
      <li>Use the dropdown and tooltips to explore category-specific inflation trends.</li>
    </ul>

    <div style="
        background:#fff8e6;
        border-left:6px solid orange;
        padding:12px;
        margin-top:10px;
        margin-bottom:10px;
        font-size:16px;
    ">
        <b>Free-form Interaction Enabled:</b><br><br>

        Compare Overall CPI with:

        <select id="comparisonSelect">
            <option value="medical">
                Medical Care CPI
            </option>

            <option value="housing">
                Housing CPI
            </option>
        </select>

        <br><br>

        Hover over points to see detailed CPI values.
    </div>
`);

    // Draw Medical by default
    drawComparisonChart("medical");

    // Dropdown trigger
    d3.select("#comparisonSelect")
      .on("change", function(){

            const selected =
                d3.select(this).property("value");

            d3.select("#chart").html("");

            drawComparisonChart(selected);
      });

    d3.select("#buttons")
      .html(`
          <button onclick="prevScene()">Back</button>
      `);
}

//////////////////////////////////////////////////////////
// NEXT / BACK TRIGGERS
//////////////////////////////////////////////////////////

function nextScene(){

    if(state.scene < 3){
        state.scene++;
    }

    renderScene();
}

function prevScene(){

    if(state.scene > 1){
        state.scene--;
    }

    renderScene();
}


//////////////////////////////////////////////////////////
// SINGLE LINE CHART
//////////////////////////////////////////////////////////

function drawChart(
    data,
    title,
    annotationText,
    color
){

    if(data.length === 0){

        d3.select("#chart")
          .html("<p>No data available for this scene.</p>");

        return;
    }

    const width = 900;
    const height = 500;
    const margin = {
        top: 60,
        right: 40,
        bottom: 60,
        left: 70
    };

    const svg =
        d3.select("#chart")
        .append("svg")
        .attr("width", width)
        .attr("height", height);

    const x =
        d3.scaleLinear()
        .domain(d3.extent(data, d => d.year))
        .range([margin.left, width - margin.right]);

    const y =
        d3.scaleLinear()
        .domain([0, d3.max(data, d => d.value)])
        .nice()
        .range([height - margin.bottom, margin.top]);

    const line =
        d3.line()
        .x(d => x(d.year))
        .y(d => y(d.value));

    svg.append("path")
       .datum(data)
       .attr("fill", "none")
       .attr("stroke", color)
       .attr("stroke-width", 3)
       .attr("d", line);

    svg.append("g")
       .attr(
           "transform",
           `translate(0,${height - margin.bottom})`
       )
       .call(
           d3.axisBottom(x)
             .tickFormat(d3.format("d"))
       );

    svg.append("g")
       .attr(
           "transform",
           `translate(${margin.left},0)`
       )
       .call(d3.axisLeft(y));

    svg.append("text")
       .attr("x", width / 2)
       .attr("y", 30)
       .attr("text-anchor", "middle")
       .style("font-size", "18px")
       .style("font-weight", "bold")
       .text(title);

    svg.append("text")
       .attr("x", 230)
       .attr("y", 75)
       .attr("class", "annotation")
       .text(annotationText);

    svg.append("text")
       .attr("x", width / 2)
       .attr("y", height - 15)
       .attr("text-anchor", "middle")
       .style("font-weight", "bold")
       .text("Year");

    svg.append("text")
       .attr("transform", "rotate(-90)")
       .attr("x", -height / 2)
       .attr("y", 20)
       .attr("text-anchor", "middle")
       .style("font-weight", "bold")
       .text("CPI Value");
}


//////////////////////////////////////////////////////////
// SCENE 3 COMPARISON CHART WITH TOOLTIPS
//////////////////////////////////////////////////////////

function drawComparisonChart(category){

    const allItems =
        getYearlyData("All items");

    
	let selectedData;
	let selectedLabel;

	if(category === "housing") {

		selectedData = getHousingYearlyData();
		selectedLabel = "Housing CPI";

	} else {

		selectedData = getMedicalYearlyData();
		selectedLabel = "Medical Care CPI";
	}



    console.log("All Items:", allItems.length);
    console.log("SelectedData:", selectedData.length);
    console.table(selectedData.slice(0,5));
	console.log("Selected Label :", selectedLabel)

    if(allItems.length === 0 || selectedData.length === 0) {

        d3.select("#chart")
          .html(`
            <p>
            Data is missing for Scene 3.
            Please check that <b>cu_Allitems.txt</b> and <b>cu_Medical.txt</b>
            are inside the data folder and contain year and value columns.
            </p>
          `);

        return;
    }

    const width = 900;
    const height = 500;
    const margin = {
        top: 60,
        right: 90,
        bottom: 70,
        left: 70
    };

    const svg =
        d3.select("#chart")
        .append("svg")
        .attr("width", width)
        .attr("height", height);

    const combined =
        [...allItems, ...selectedData];

    const x =
        d3.scaleLinear()
        .domain(d3.extent(combined, d => d.year))
        .range([margin.left, width - margin.right]);

    const y =
        d3.scaleLinear()
        .domain([0, d3.max(combined, d => d.value)])
        .nice()
        .range([height - margin.bottom, margin.top]);

    const line =
        d3.line()
        .x(d => x(d.year))
        .y(d => y(d.value));

    /////////////////////////////////////////////////////
    // LINES
    /////////////////////////////////////////////////////

    svg.append("path")
       .datum(allItems)
       .attr("fill", "none")
       .attr("stroke", "blue")
       .attr("stroke-width", 3)
       .attr("d", line);

    svg.append("path")
       .datum(selectedData)
       .attr("fill", "none")
       .attr("stroke", "orange")
       .attr("stroke-width", 3)
       .attr("d", line);

    /////////////////////////////////////////////////////
    // AXES
    /////////////////////////////////////////////////////

    svg.append("g")
       .attr(
           "transform",
           `translate(0,${height - margin.bottom})`
       )
       .call(
           d3.axisBottom(x)
             .tickFormat(d3.format("d"))
       );

    svg.append("g")
       .attr(
           "transform",
           `translate(${margin.left},0)`
       )
       .call(d3.axisLeft(y));

    /////////////////////////////////////////////////////
    // AXIS LABELS
    /////////////////////////////////////////////////////

    svg.append("text")
       .attr("x", width / 2)
       .attr("y", height - 20)
       .attr("text-anchor", "middle")
       .style("font-weight", "bold")
       .text("Year");

    svg.append("text")
       .attr("transform", "rotate(-90)")
       .attr("x", -height / 2)
       .attr("y", 20)
       .attr("text-anchor", "middle")
       .style("font-weight", "bold")
       .text("CPI Value");

    /////////////////////////////////////////////////////
    // TITLE
    /////////////////////////////////////////////////////

    svg.append("text")
       .attr("x", width / 2)
       .attr("y", 30)
       .attr("text-anchor", "middle")
       .style("font-size", "18px")
       .style("font-weight", "bold")
       .text(selectedLabel + " Compared with Overall CPI");

    /////////////////////////////////////////////////////
    // ANNOTATION
    /////////////////////////////////////////////////////

    svg.append("rect")
       .attr("x", 190)
       .attr("y", 48)
       .attr("width", 500)
       .attr("height", 34)
       .attr("fill", "#fff4f4")
       .attr("stroke", "red")
       .attr("rx", 5);

    svg.append("text")
       .attr("x", 305)
       .attr("y", 70)
       .attr("class", "annotation")
      
.text(
    category === "housing"
    ? "Housing CPI generally tracked Overall CPI but followed a different long-term path."
    : "Medical Care CPI increased faster than Overall CPI over time."
);


    /////////////////////////////////////////////////////
    // LEGEND
    /////////////////////////////////////////////////////

   
svg.append("circle")
   .attr("cx", width - 350)
   .attr("cy", 105)
   .attr("r", 6)
   .style("fill", "blue");

svg.append("text")
   .attr("x", width - 320)
   .attr("y", 110)
   .text("All Items CPI");


    svg.append("circle")
       .attr("cx", width - 350)
       .attr("cy", 130)
       .attr("r", 6)
       .attr("fill", "orange");

    svg.append("text")
       .attr("x", width - 320)
       .attr("y", 135)
       .text(selectedLabel);
	   
    /////////////////////////////////////////////////////
    // TOOLTIP
    /////////////////////////////////////////////////////

    const tooltip =
        d3.select(".tooltip");

    function addTooltipDots(data, categoryName, dotColor){

        svg.selectAll("." + categoryName.replace(/\s/g, "") + "Dot")
           .data(data)
           .enter()
           .append("circle")
           .attr("cx", d => x(d.year))
           .attr("cy", d => y(d.value))
           .attr("r", 6)
           .attr("fill", dotColor)
           .attr("stroke", "black")
           .attr("stroke-width", 1)
           .style("cursor", "pointer")

           .on("mouseover", function(event, d){

                d3.select(this)
                  .attr("r", 9);

                tooltip
                    .style("visibility", "visible")
                    .html(
                        "<b>" + categoryName + "</b><br>" +
                        "Year: " + d.year +
                        "<br>CPI: " + d.value.toFixed(2)
                    );
           })

           .on("mousemove", function(event){

                tooltip
                    .style("left", (event.pageX + 12) + "px")
                    .style("top", (event.pageY - 25) + "px");
           })

           .on("mouseout", function(){

                d3.select(this)
                  .attr("r", 6);

                tooltip
                    .style("visibility", "hidden");
           });
    }

    addTooltipDots(
        allItems,
        "All Items CPI",
        "blue"
    );

    
addTooltipDots(
    selectedData,
    selectedLabel,
    "orange"
);

}

</script>

</body>
</html>
