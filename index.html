
<!DOCTYPE html>
<html>

<head>
    <title>Step 1 - Load Data</title>

    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>

<body>

<h1>Step 1 - Load Data</h1>

<div id="output">
    Loading...
</div>

<script>

// Clean headers and values
function cleanRow(d) {

    const clean = {};

    for (let key in d) {

        clean[key.trim()] =
            d[key] ? d[key].trim() : "";
    }

    return clean;
}


Promise.all([
    d3.tsv("data/cu_series.txt", cleanRow),
    d3.tsv("data/cu_items.txt", cleanRow),
    d3.tsv("data/cu_Allitems.txt", cleanRow)
])

.then(function([seriesData, itemData, valueData]) {


const itemLookup = new Map(
    itemData.map(d => [d.item_code, d])
);

const seriesLookup = new Map(
    seriesData.map(d => [d.series_id, d])
);


const joinedData = valueData.map(value => {

    const series = seriesLookup.get(value.series_id);

    const item = series
        ? itemLookup.get(series.item_code)
        : null;

    return {

        // cu_Allitems
        series_id: value.series_id,
        year: value.year,
        period: value.period,
        value: +value.value,

        // cu_series
        item_code: series ? series.item_code : "",
        seasonal: series ? series.seasonal : "",
        series_title: series ? series.series_title : "",

        // cu_items
        item_name: item ? item.item_name : "",
        display_level: item ? item.display_level : ""

    };
});

let html = "";

html += "<h2>Join Validation</h2>";

html += "Series Records: " + seriesData.length + "<br>";
html += "Item Records: " + itemData.length + "<br>";
html += "Value Records: " + valueData.length + "<br>";
html += "Joined Records: " + joinedData.length + "<br><br>";

html += "<h3>Columns</h3>";

Object.keys(joinedData[0]).forEach(col => {
    html += col + "<br>";
});

html += "<br><h3>First 5 Rows</h3>";
html += "<pre>";
html += JSON.stringify(joinedData.slice(0, 5), null, 2);
html += "</pre>";

document.getElementById("output").innerHTML = html;

})

.catch(function(error) {

    document.getElementById("output").innerHTML =
        "<h2>Error Loading Files</h2><pre>" +
        error +
        "</pre>";

    console.error(error);

});

</script>

</body>

</html>
