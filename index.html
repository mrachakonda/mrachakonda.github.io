
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">

    <script src="https://d3js.org/d3.v7.min.js"></script>

    <title>Healthcare Inflation Narrative</title>
</head>

<body>

<h1>Healthcare Inflation Narrative Visualization</h1>

<div id="output">
Loading files...
</div>

<script>

Promise.all([

    d3.tsv("data/cu_series.txt"),
    d3.tsv("data/cu_AllItems.txt"),
    d3.tsv("data/cu_item.txt")

]).then(function(files){

    const series = files[0];
    const data = files[1];
    const items = files[2];

    console.log(series);
    console.log(data);
    console.log(items);

    d3.select("#output")
        .html(`
            <h3>Files Loaded Successfully</h3>

            Series Rows: ${series.length}<br>
            Data Rows: ${data.length}<br>
            Item Rows: ${items.length}
        `);

}).catch(function(error){

    console.error(error);

    d3.select("#output")
        .html("Error loading files");

});

</script>

</body>

</html>
