
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Amazon Narrative Visualization</title>

    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>

<body>

<h1>Amazon Narrative Visualization</h1>

<div id="status">Loading...</div>
<div id="error"></div>

<script>

Promise.all([
    d3.csv("data/products.csv"),
    d3.csv("data/categories.csv")
])
.then(([products, categories]) => {

    document.getElementById("status").innerHTML =
        `Loaded ${products.length} products and ${categories.length} categories`;

    console.log(products);
    console.log(categories);

    
const categoryMap = {};

categories.forEach(category => {
    categoryMap[category.id] = category;
});

const joinedData = products.map(product => ({
    ...product,
    category: categoryMap[product.category_id]
}));

console.log(joinedData.slice(0,5));

document.getElementById("status").innerHTML =
    `Loaded ${joinedData.length} joined products`;


})
.catch(error => {

    console.error(error);

    document.getElementById("error").innerHTML =
        "Failed to load CSV files";

});

</script>

</body>
</html>
