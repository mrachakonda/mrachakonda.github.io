<script>

/************************************************************
 * PARAMETERS / STATE VARIABLES
 *
 * These are the parameters of the narrative visualization.
 * They control which scene is drawn and what data is shown.
 ************************************************************/

const state = {
    scene: 1,
    selectedItem: "All items",
    selectedComparison: "All items less food and energy"
};


/************************************************************
 * GLOBAL DATA
 ************************************************************/

let joinedData = [];

const margin = { top: 60, right: 90, bottom: 70, left: 80 };
const outerWidth = 950;
const outerHeight = 520;
const width = outerWidth - margin.left - margin.right;
const height = outerHeight - margin.top - margin.bottom;


/************************************************************
 * CLEAN ROW FUNCTION
 *
 * Your files have tab delimiters and spaces after some values.
 * This function trims column names and values.
 ************************************************************/

function cleanRow(d) {
    const clean = {};

    for (let key in d) {
        const newKey = key.trim();

        if (typeof d[key] === "string") {
            clean[newKey] = d[key].trim();
        } else {
            clean[newKey] = d[key];
        }
    }

    return clean;
}


/************************************************************
 * LOAD 3 FILES
 ************************************************************/

Promise.all([
    d3.tsv("data/cu_series.txt", cleanRow),
    d3.tsv("data/cu_Allitems.txt", cleanRow),
    d3.tsv("data/cu_items.txt", cleanRow)
])
.then(function([seriesData, allItemsData, itemData]) {

    console.log("cu_series rows:", seriesData.length);
    console.log("cu_Allitems rows:", allItemsData.length);
    console.log("cu_items rows:", itemData.length);

    const seriesLookup = new Map(
        seriesData.map(d => [d.series_id.trim(), d])
    );

    const itemLookup = new Map(
        itemData.map(d => [d.item_code.trim(), d])
    );

    joinedData = allItemsData.map(d => {

        const series = seriesLookup.get(d.series_id.trim());

        const item = series
            ? itemLookup.get(series.item_code.trim())
            : null;

        const monthNumber = d.period
            ? +d.period.replace("M", "")
            : null;

        return {
            series_id: d.series_id ? d.series_id.trim() : "",
            year: +d.year,
            period: d.period ? d.period.trim() : "",
            month: monthNumber,
            value: +d.value,

            item_code: series ? series.item_code.trim() : "",
            series_title: series ? series.series_title : "",
            seasonal: series ? series.seasonal : "",

            item_name: item ? item.item_name.trim() : "Unknown",
            display_level: item ? item.display_level : ""
        };
    })
    .filter(d =>
        d.series_id !== "" &&
        !isNaN(d.year) &&
        !isNaN(d.month) &&
        !isNaN(d.value) &&
        d.period !== "M13" &&
        d.item_name !== "Unknown"
    );

    joinedData.forEach(d => {
        d.date = new Date(d.year, d.month - 1, 1);
    });

    console.log("Joined records:", joinedData.length);
    console.table(joinedData.slice(0, 5));

    renderScene();

})
.catch(function(error) {
    console.error("Error loading files:", error);

    d3.select("#sceneTitle").html("Error Loading Files");

    d3.select("#storyText").html(`
        <p>Please confirm these files exist exactly in your data folder:</p>
        <ul>
            <li>data/cu_series.txt</li>
            <li>data/cu_Allitems.txt</li>
            <li>data/cu_items.txt</li>
        </ul>
        <p><b>Error:</b> ${error}</p>
    `);
});


/************************************************************
 * TRIGGER FUNCTIONS
 *
 * These functions change parameters and redraw the scene.
 ************************************************************/

function goToScene(sceneNumber) {
    state.scene = sceneNumber;
    renderScene();
}

function changeSelectedItem() {
    state.selectedItem = d3.select("#itemSelect").property("value");
    renderScene();
}

function changeComparisonItem() {
    state.selectedComparison = d3.select("#comparisonSelect").property("value");
    renderScene();
}


/************************************************************
 * MAIN SCENE RENDERER
 *
 * This clears the containers and repopulates them.
 * This follows the professor's suggested d3.select(id).html("")
 * approach.
 ************************************************************/

function renderScene() {

    d3.select("#sceneTitle").html("");
    d3.select("#storyText").html("");
    d3.select("#controls").html("");
    d3.select("#chart").html("");
    d3.select("#buttons").html("");

    if (state.scene === 1) {
        scene1Intro();
    } else if (state.scene === 2) {
        scene2OverallCPI();
    } else if (state.scene === 3) {
        scene3Post2020();
    } else if (state.scene === 4) {
        scene4EnergyVolatility();
    } else if (state.scene === 5) {
        scene5CoreCPIComparison();
    } else if (state.scene === 6) {
        scene6ShelterComparison();
    } else if (state.scene === 7) {
        scene7Explore();
    }
}

 * DATA HELPERS
 ************************************************************/
