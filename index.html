
<!DOCTYPE html>
<html>

<head>
    <title>Step 3 - Load Data</title>

    <script src="https://d3js.org/d3.v7.min.js"></script>

    <style>
        table {
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            border: 1px solid black;
            padding: 5px;
            text-align: left;
        }

        th {
            background-color: lightgray;
        }
    </style>
</head>

<body>

<h1>Step 3 - Load cu_series.txt</h1>

<div id="output">
Loading...
</div>

<script>

d3.tsv("data/cu_series.txt")
.then(function(data) {

    const columns = Object.keys(data[0]);

    let html = `
        <b>Total Records:</b> ${data.length}<br><br>

        <b>Columns:</b><br>
        ${columns.join("<br>")}
        <br><br>

        <b>Sample 5 Rows</b>
        <table>
            <thead>
                <tr>
    `;

    // Header row
    columns.forEach(col => {
        html += `<th>${col}</th>`;
    });

    html += `
                </tr>
            </thead>
            <tbody>
    `;

    // First 5 records
    data.slice(0, 5).forEach(row => {

        html += "<tr>";

        columns.forEach(col => {
            html += `<td>${row[col]}</td>`;
        });

        html += "</tr>";
    });

    html += `
            </tbody>
        </table>
    `;

    document.getElementById("output").innerHTML = html;

})
.catch(function(error) {

    document.getElementById("output").innerHTML =
        "Error loading file: " + error;

});

</script>

</body>

</html>
