<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>D3 TSV Example</title>
    <!-- 1. LOAD D3 FIRST IN HEAD -->
    <script src="https://jsdelivr.net"></script>
</head>
<body>

    <!-- 2. PLACE YOUR LAYOUT CONTAINERS HERE -->
    <div id="chart-container"></div>

    <!-- 3. PLACE DATA LOADING LOGIC IN A SCRIPT AT THE BOTTOM -->
    <script>
        // Target your HTML elements
        const container = d3.select("#chart-container");

        // Execute the file reading request
        d3.tsv("data/cu_item.txt", d3.autoType)
            .then(data => {
                console.log("Data loaded successfully:", data);
                // Draw your visualization here using 'data'
            })
            .catch(error => {
                console.error("Error reading file:", error);
            });
    </script>

</body>
</html>
